<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意识拓扑 · AI 因果推理评测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--panel:#111118;--border:#1e1e2e;--accent:#7c5ce7;--text:#e0e0e0;--muted:#666;--green:#2ecc71;--red:#e74c3c;--gold:#f0c040}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC',sans-serif;min-height:100vh}
.hero{text-align:center;padding:40px 20px 20px;background:linear-gradient(180deg,#0d1117,#0a0a0f)}
.hero h1{font-size:32px;font-weight:300;letter-spacing:2px;color:#fff}
.hero h1 b{color:var(--accent);font-weight:600}
.hero .tagline{color:var(--muted);margin-top:8px;font-size:13px}

.setup{max-width:700px;margin:0 auto;padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.setup label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
.setup input,.setup select{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;min-width:140px}
.setup input:focus,.setup select:focus{outline:none;border-color:var(--accent)}
.setup button{background:var(--accent);color:#fff;border:none;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap}
.setup button:disabled{opacity:.4;cursor:not-allowed}

.main{display:flex;gap:20px;padding:16px 20px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.grid-panel{background:var(--panel);border-radius:12px;padding:16px;border:1px solid var(--border)}
.grid-panel h3{font-size:13px;font-weight:500;margin-bottom:8px;color:#aaa;text-align:center}
canvas{display:block;margin:0 auto;border-radius:8px}

.info-panel{background:var(--panel);border-radius:12px;padding:16px;border:1px solid var(--border);flex:1;min-width:300px;max-height:70vh;overflow-y:auto}
.info-panel h3{font-size:13px;font-weight:500;margin-bottom:8px;color:#aaa}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border);gap:12px}
.stat-row .val{font-weight:600;text-align:right}
.stat-row .val.grade-a{color:var(--accent)}
.stat-row .val.grade-b{color:var(--gold)}
.stat-row .val.grade-c{color:var(--green)}
.stat-row .val.grade-d{color:#ff9800}
.stat-row .val.grade-e{color:var(--red)}

.log{font-size:11px;color:var(--muted);margin-top:8px;max-height:300px;overflow-y:auto}
.log .entry{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log .success{color:var(--green)}
.log .error{color:var(--red)}
.log .info{color:var(--accent)}
.log .hint{color:var(--gold)}

.legend{display:flex;gap:16px;justify-content:center;margin:8px 0;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:2px}
.legend .dot.key{background:#ff9800}.legend .dot.door{background:#e91e63}.legend .dot.wall{background:#2a2a3e}
.legend .dot.start{background:var(--accent)}.legend .dot.goal{background:var(--green)}

.footer{text-align:center;padding:20px;color:#333;font-size:11px}

.result-banner{text-align:center;padding:12px;margin:12px 0;border-radius:8px;font-size:14px;display:none}
.result-banner.show{display:block}
.result-banner.grade-a{background:rgba(124,92,231,.15);border:1px solid var(--accent);color:var(--accent)}
.result-banner.grade-b{background:rgba(240,192,64,.15);border:1px solid var(--gold);color:var(--gold)}
.result-banner.grade-c{background:rgba(46,204,113,.15);border:1px solid var(--green);color:var(--green)}
</style>
</head>
<body>

<div class="hero">
  <h1><b>意识拓扑</b> · AI 因果推理评测</h1>
  <p class="tagline">让 AI 在因果链迷宫中自行推理——拾取密钥、通过对应门、严格按序前进</p>
</div>

<div class="setup">
  <label>模型<select id="model-select">
    <option value="deepseek-chat">DeepSeek-Chat</option>
    <option value="deepseek-reasoner">DeepSeek-Reasoner</option>
    <option value="gpt-4o-mini">GPT-4o-mini</option>
    <option value="gpt-4o">GPT-4o</option>
  </select></label>
  <label>API Key<input id="api-key" type="password" placeholder="sk-..."></label>
  <label>因果链长度<select id="chain-len">
    <option value="2">2 对</option>
    <option value="3" selected>3 对</option>
    <option value="4">4 对</option>
  </select></label>
  <button id="btn-start" onclick="start()">开始评测</button>
  <button id="btn-stop" onclick="stop()" style="background:#e74c3c;display:none">停止</button>
</div>

<div class="main">
  <div class="grid-panel">
    <h3>因果链迷宫 <span id="step-info" style="color:var(--muted)">—</span></h3>
    <canvas id="grid-canvas" width="420" height="420"></canvas>
    <div class="legend">
      <span><span class="dot start"></span>起点</span>
      <span><span class="dot goal"></span>终点</span>
      <span><span class="dot key"></span>密钥N</span>
      <span><span class="dot door"></span>门N</span>
      <span><span class="dot wall"></span>墙</span>
    </div>
  </div>
  <div class="info-panel" id="info-panel">
    <h3>评测状态</h3>
    <div id="result-banner" class="result-banner"></div>
    <div id="stats">
      <div class="stat-row"><span>持有密钥</span><span class="val" id="stat-keys">—</span></div>
      <div class="stat-row"><span>已通过因果对</span><span class="val" id="stat-pairs">0 / —</span></div>
      <div class="stat-row"><span>当前步数</span><span class="val" id="stat-steps">0 / 300</span></div>
      <div class="stat-row"><span>完整推理率</span><span class="val" id="stat-complete">—</span></div>
      <div class="stat-row"><span>跳步率</span><span class="val" id="stat-skip">—</span></div>
      <div class="stat-row"><span>步数效率</span><span class="val" id="stat-efficiency">—</span></div>
      <div class="stat-row"><span>综合评价</span><span class="val" id="stat-grade">—</span></div>
    </div>
    <h3 style="margin-top:12px">推理日志</h3>
    <div class="log" id="log"></div>
  </div>
</div>

<div class="footer">意识拓扑验证 · v2.2 因果链迷宫评测框架</div>

<script>
// ═══════════════════════════════════════════
// 场景生成（JavaScript 移植自 causal_scene.py）
// ═══════════════════════════════════════════
const SIZE = 30;
const KEY_START = 10, DOOR_START = 20, MAX_KEYS = 10;

function createScene(chainLen) {
  const grid = Array.from({length:SIZE}, ()=>Array(SIZE).fill(0));
  const keyPositions = {};
  const doorPositions = {};
  const chain = [];

  // 起始和终点
  grid[0][0] = 2;
  grid[SIZE-1][SIZE-1] = 3;

  // 生成墙体迷宫结构
  for (let y=0; y<SIZE; y++) {
    for (let x=0; x<SIZE; x++) {
      if (x===0&&y===0) continue;
      if (x===SIZE-1&&y===SIZE-1) continue;
      if (Math.random() < 0.12) grid[y][x] = 1;
    }
  }

  // 保证起点终点可达（挖通一条基本路径）
  let cx=0, cy=0;
  while (cx<SIZE-1 || cy<SIZE-1) {
    if (cx<SIZE-1 && (cy>=SIZE-1 || Math.random()>.5)) cx++;
    else cy++;
    if (cx<SIZE && cy<SIZE) grid[cy][cx] = 0;
  }
  grid[0][0] = 2;
  grid[SIZE-1][SIZE-1] = 3;

  // 放置钥匙和门
  const sectors = [
    {kx:5,ky:5, dx:SIZE-8,dy:5},
    {kx:SIZE-8,ky:5, dx:5,dy:SIZE-8},
    {kx:5,ky:SIZE-8, dx:SIZE-8,dy:SIZE-8},
    {kx:12,ky:SIZE-12, dx:SIZE-12,dy:10},
  ];

  for (let i=0; i<chainLen; i++) {
    const s = sectors[i % sectors.length];
    const kid = KEY_START + i, did = DOOR_START + i;
    let kx = s.kx + Math.floor(Math.random()*6);
    let ky = s.ky + Math.floor(Math.random()*6);
    let dx = s.dx + Math.floor(Math.random()*6);
    let dy = s.dy + Math.floor(Math.random()*6);

    if (kx<0||kx>=SIZE||ky<0||ky>=SIZE) { kx=2+i*3; ky=2+i*3; }
    if (dx<0||dx>=SIZE||dy<0||dy>=SIZE) { dx=SIZE-3-i*3; dy=SIZE-3-i*3; }

    grid[ky][kx] = kid;
    keyPositions[kid] = [kx, ky];
    grid[dy][dx] = did;
    doorPositions[did] = [dx, dy];
    chain.push([kid, did]);

    // 门周围放墙形成隔离
    for (let yy=dy-1; yy<=dy+1; yy++) {
      for (let xx=dx-1; xx<=dx+1; xx++) {
        if (yy>=0&&yy<SIZE&&xx>=0&&xx<SIZE && grid[yy][xx]===0) {
          if (xx!==dx || yy!==dy) grid[yy][xx] = 1;
        }
      }
    }
    // 留一个开口
    const openingDir = [[0,-1],[1,0],[0,1],[-1,0]][i%4];
    let ox=dx+openingDir[0], oy=dy+openingDir[1];
    if (ox>=0&&ox<SIZE&&oy>=0&&oy<SIZE) grid[oy][ox] = 0;
    grid[dy][dx] = did;
  }

  return {
    grid, keyPositions, doorPositions, chain,
    start: [0,0], goal: [SIZE-1, SIZE-1],
    description: `因果链长度=${chainLen}, 大小=${SIZE}×${SIZE}`
  };
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
const CELL_SIZE = 420 / SIZE;

function drawGrid(scene, robot, trail, inventory) {
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');

  // 背景
  ctx.fillStyle = '#0d0d15';
  ctx.fillRect(0,0,420,420);

  // 格子
  const {grid, keyPositions, doorPositions} = scene;
  for (let y=0; y<SIZE; y++) {
    for (let x=0; x<SIZE; x++) {
      const cell = grid[y][x];
      if (cell === 1) {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x*CELL_SIZE+1, y*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
      } else if (cell === 2) {
        ctx.fillStyle = '#7c5ce7';
        ctx.fillRect(x*CELL_SIZE+1, y*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
      } else if (cell === 3) {
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(x*CELL_SIZE+1, y*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
      } else if (cell >= KEY_START && cell < DOOR_START) {
        ctx.fillStyle = inventory && inventory.has(cell) ? '#0d0d15' : '#ff9800';
        ctx.fillRect(x*CELL_SIZE+1, y*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
        if (!(inventory && inventory.has(cell))) {
          ctx.fillStyle = '#000';
          ctx.font = `${CELL_SIZE*.6}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(`K${cell-KEY_START}`, x*CELL_SIZE+CELL_SIZE/2, y*CELL_SIZE+CELL_SIZE*.65);
        }
      } else if (cell >= DOOR_START) {
        ctx.fillStyle = '#e91e63';
        ctx.fillRect(x*CELL_SIZE+1, y*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
        ctx.fillStyle = '#fff';
        ctx.font = `${CELL_SIZE*.6}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(`D${cell-DOOR_START}`, x*CELL_SIZE+CELL_SIZE/2, y*CELL_SIZE+CELL_SIZE*.65);
      }
    }
  }

  // 网格线
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i=0; i<=SIZE; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,420); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE); ctx.lineTo(420,i*CELL_SIZE); ctx.stroke();
  }

  // 路径
  if (trail && trail.length>1) {
    ctx.strokeStyle = 'rgba(124,92,231,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(trail[0][0]*CELL_SIZE+CELL_SIZE/2, trail[0][1]*CELL_SIZE+CELL_SIZE/2);
    for (let i=1; i<trail.length; i++) {
      ctx.lineTo(trail[i][0]*CELL_SIZE+CELL_SIZE/2, trail[i][1]*CELL_SIZE+CELL_SIZE/2);
    }
    ctx.stroke();
  }

  // 机器人
  if (robot) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(robot[0]*CELL_SIZE+CELL_SIZE/2, robot[1]*CELL_SIZE+CELL_SIZE/2, CELL_SIZE/2-1, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#7c5ce7';
    ctx.beginPath();
    ctx.arc(robot[0]*CELL_SIZE+CELL_SIZE/2, robot[1]*CELL_SIZE+CELL_SIZE/2, CELL_SIZE/2-2, 0, Math.PI*2);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════
// API 调用
// ═══════════════════════════════════════════
function getBaseUrl(model) {
  if (model.includes('deepseek')) return 'https://api.deepseek.com/v1';
  return 'https://api.openai.com/v1';
}

async function askModel(messages, model, apiKey) {
  const resp = await fetch(`${getBaseUrl(model)}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: model,
      messages: messages,
      temperature: 0,
      max_tokens: 20
    })
  });
  if (!resp.ok) throw new Error(`API ${resp.status}: ${await resp.text()}`);
  const data = await resp.json();
  return data.choices[0].message.content.trim();
}

// ═══════════════════════════════════════════
// 评测逻辑
// ═══════════════════════════════════════════
const DIRS = [[0,-1],[1,0],[0,1],[-1,0]];
const DIR_NAMES = ['up','right','down','left'];

function cellLabel(cell) {
  if (cell===0) return '空地';
  if (cell===1) return '墙';
  if (cell===2) return '起点';
  if (cell===3) return '终点';
  if (cell>=KEY_START && cell<DOOR_START) return `密钥${cell-KEY_START}`;
  if (cell>=DOOR_START) return `门${cell-DOOR_START}`;
  return `未知`;
}

function buildPrompt(pos, goal, inventory, step, chainLen, scene, history) {
  const {grid} = scene;
  const [px, py] = pos;
  const [gx, gy] = goal;

  // 周围格子
  let nearby = [];
  for (const [dx,dy] of DIRS) {
    const nx=px+dx, ny=py+dy;
    if (nx>=0&&ny>=0&&nx<SIZE&&ny<SIZE) {
      let cell = grid[ny][nx];
      // 已拾取的钥匙视为空地
      if (cell>=KEY_START && cell<DOOR_START && inventory.has(cell)) cell = 0;
      nearby.push(`  ${DIR_NAMES[DIRS.findIndex(d=>d[0]===dx&&d[1]===dy)]}: ${cellLabel(cell)}`);
    } else {
      nearby.push(`  ${DIR_NAMES[DIRS.findIndex(d=>d[0]===dx&&d[1]===dy)]}: 出界`);
    }
  }

  // 合法动作
  let legal = [];
  for (const [dx,dy] of DIRS) {
    const nx=px+dx, ny=py+dy;
    if (nx<0||ny<0||nx>=SIZE||ny>=SIZE) continue;
    const cell = grid[ny][nx];
    if (cell === 1) continue;
    // 门检查
    if (cell>=DOOR_START) {
      const doorIdx = cell - DOOR_START;
      if (!inventory.has(KEY_START + doorIdx)) continue;
    }
    legal.push([dx,dy]);
  }
  if (legal.length===0) legal = DIRS;

  const legalDesc = legal.map(d=>DIR_NAMES[DIRS.findIndex(dd=>dd[0]===d[0]&&dd[1]===d[1])]).join(', ');
  const heldStr = [...inventory].filter(k=>k>=KEY_START && k<KEY_START+MAX_KEYS).map(k=>k-KEY_START).join(',') || '无';

  // 目标指引
  let targetHint = '';
  if (step < chainLen) {
    const kid = KEY_START + step;
    if (inventory.has(kid)) {
      const dp = scene.doorPositions[DOOR_START + step];
      if (dp) targetHint = `已持有密钥${step}，请前往门${step}(${dp[0]},${dp[1]})`;
    } else {
      const kp = scene.keyPositions[kid];
      if (kp) targetHint = `缺少密钥${step}，请前往密钥${step}(${kp[0]},${kp[1]})`;
    }
  } else {
    targetHint = `请前往终点(${gx},${gy})`;
  }

  // 历史警告
  let historyStr = '';
  if (history.length >= 4) {
    const last4 = history.slice(-4);
    if (last4[0][0]===last4[2][0] && last4[0][1]===last4[2][1] &&
        last4[1][0]===last4[3][0] && last4[1][1]===last4[3][1]) {
      historyStr = '\n警告：你在两个位置间反复震荡！请果断向目标前进，不要回头。';
    }
  }

  return {
    messages: [
      {role:'system', content:'迷宫导航。密钥N→门N，按序前进。不回头。只回复 up / right / down / left。'},
      {role:'user', content:
        `位置(${px},${py}) → 终点(${gx},${gy}) | 已通过${step}/${chainLen}对\n`+
        `已持密钥: ${heldStr}\n`+
        (targetHint ? `目标: ${targetHint}\n` : '')+
        `周围:\n${nearby.join('\n')}\n`+
        `可选方向: ${legalDesc}${historyStr}`
      }
    ],
    legal
  };
}

function parseDirection(text, legal) {
  text = text.toLowerCase();
  for (let i=0; i<DIR_NAMES.length; i++) {
    if (text.includes(DIR_NAMES[i]) && legal.some(d=>d[0]===DIRS[i][0]&&d[1]===DIRS[i][1])) {
      return DIRS[i];
    }
  }
  return null;
}

// ═══════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════
let running = false;
let stopRequested = false;
let scene, pos, inventory, step, trail, totalSteps, chainLen;
let model, apiKey;
let totalTrials = 4;
let trialResults = [];

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="entry ${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('stat-keys').textContent =
    [...inventory].filter(k=>k>=KEY_START && k<KEY_START+MAX_KEYS).map(k=>k-KEY_START).join(',') || '—';
  document.getElementById('stat-pairs').textContent = `${step} / ${chainLen}`;
  document.getElementById('stat-steps').textContent = `${totalSteps} / 300`;
  document.getElementById('step-info').textContent = `步数: ${totalSteps}`;
}

function computeGrade(trialResults) {
  if (trialResults.length === 0) return {grade:'—', cls:''};
  let complete = 0, totalPairs=0, totalStep=0, reached=0;
  for (const r of trialResults) {
    totalPairs += r.chainLen;
    complete += r.completedPairs;
    totalStep += r.steps;
    if (r.reached) reached++;
  }
  const completeRate = complete / totalPairs;
  const skipRate = 0; // 简化：无跳步检测
  const stepEff = totalStep > 0 ? Math.min(1, (chainLen*4) / Math.max(totalStep/trialResults.length, 1)) : 0;
  const goalRate = reached / trialResults.length;
  const composite = completeRate*.4 + (1-skipRate)*.25 + stepEff*.25 + goalRate*.1;

  let grade, cls;
  if (composite >= 0.9) { grade='A 级 · 因果推理完备'; cls='grade-a'; }
  else if (composite >= 0.75) { grade='B 级 · 良好'; cls='grade-b'; }
  else if (composite >= 0.5) { grade='C 级 · 及格'; cls='grade-c'; }
  else if (composite >= 0.25) { grade='D 级 · 薄弱'; cls='grade-d'; }
  else { grade='E 级 · 不具备因果推理'; cls='grade-e'; }

  return {
    grade, cls, composite, completeRate, skipRate, stepEff, goalRate,
    reached, totalTrials: trialResults.length
  };
}

function showResult(result) {
  document.getElementById('stat-complete').textContent = (result.completeRate*100).toFixed(0)+'%';
  document.getElementById('stat-skip').textContent = (result.skipRate*100).toFixed(0)+'%';
  document.getElementById('stat-efficiency').textContent = (result.stepEff*100).toFixed(0)+'%';
  document.getElementById('stat-grade').textContent = result.grade;
  document.getElementById('stat-grade').className = 'val '+result.cls;

  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner show '+result.cls;
  banner.innerHTML = `<strong>${result.grade}</strong> &nbsp; 综合分 ${result.composite.toFixed(3)} &nbsp;|&nbsp; ${result.reached}/${result.totalTrials} 次到达终点`;
}

async function runTrial() {
  pos = [scene.start[0], scene.start[1]];
  inventory = new Set();
  step = 0;
  trail = [[pos[0], pos[1]]];
  totalSteps = 0;
  const history = [];

  while (totalSteps < 300) {
    if (stopRequested) return null;

    // 构建 prompt
    const {messages, legal} = buildPrompt(pos, scene.goal, inventory, step, chainLen, scene, history);

    // API 调用
    let response;
    try {
      response = await askModel(messages, model, apiKey);
    } catch(e) {
      log(`API 错误: ${e.message}`, 'error');
      return null;
    }

    const dir = parseDirection(response, legal);
    totalSteps++;

    if (!dir) {
      log(`步${totalSteps}: 模型返回 "${response.slice(0,30)}" → 无法解析，随机移动`, 'error');
      const rd = legal[Math.floor(Math.random()*legal.length)];
      pos = [pos[0]+rd[0], pos[1]+rd[1]];
    } else {
      const dirName = DIR_NAMES[DIRS.findIndex(d=>d[0]===dir[0]&&d[1]===dir[1])];
      pos = [pos[0]+dir[0], pos[1]+dir[1]];
      log(`步${totalSteps}: → ${dirName} | "${response.slice(0,30)}"`, 'success');
    }

    trail.push([pos[0], pos[1]]);
    history.push([pos[0], pos[1]]);

    // 检查当前位置
    const [px, py] = pos;
    const cell = scene.grid[py][px];

    if (cell >= KEY_START && cell < DOOR_START) {
      if (!inventory.has(cell)) {
        inventory.add(cell);
        log(`拾取密钥${cell-KEY_START}！`, 'hint');
      }
    }

    if (cell >= DOOR_START) {
      const doorIdx = cell - DOOR_START;
      if (inventory.has(KEY_START + doorIdx)) {
        if (doorIdx === step) {
          step++;
          log(`通过门${doorIdx}！因果对 ${step}/${chainLen} 完成`, 'info');
        }
      }
    }

    // 到达终点
    if (cell === 3) {
      log(`到达终点！`, 'info');
      break;
    }

    // 渲染
    drawGrid(scene, pos, trail, inventory);
    updateStats();
    await new Promise(r=>setTimeout(r, step<chainLen ? 50 : 20));
  }

  const reached = pos[0]===scene.goal[0] && pos[1]===scene.goal[1];
  return {
    steps: totalSteps,
    completedPairs: step,
    chainLen,
    reached,
    trail
  };
}

// ═══════════════════════════════════════════
// 主流程
// ═══════════════════════════════════════════
async function start() {
  model = document.getElementById('model-select').value;
  apiKey = document.getElementById('api-key').value.trim();
  chainLen = parseInt(document.getElementById('chain-len').value);

  if (!apiKey) { alert('请输入 API Key'); return; }

  running = true;
  stopRequested = false;
  trialResults = [];
  document.getElementById('log').innerHTML = '';
  document.getElementById('result-banner').className = 'result-banner';
  document.getElementById('stat-complete').textContent = '—';
  document.getElementById('stat-skip').textContent = '—';
  document.getElementById('stat-efficiency').textContent = '—';
  document.getElementById('stat-grade').textContent = '—';
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').style.display = '';

  scene = createScene(chainLen);
  drawGrid(scene, null, null, null);

  log(`生成场景: 因果链长度=${chainLen}, 开始评测 (共${totalTrials}次试验)...`, 'info');

  for (let t=0; t<totalTrials; t++) {
    if (stopRequested) break;
    log(`\n── 第 ${t+1}/${totalTrials} 次试验 ──`, 'info');
    scene = createScene(chainLen);
    const result = await runTrial();

    if (result) {
      trialResults.push(result);
      log(`试验${t+1}: ${result.reached?'✓到达终点':'✗未到达'} | 完成${result.completedPairs}/${chainLen}因果对 | ${result.steps}步`, result.reached?'success':'error');
    } else {
      log(`试验${t+1}: 失败`, 'error');
    }
  }

  if (trialResults.length > 0) {
    const grade = computeGrade(trialResults);
    showResult(grade);
  }

  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
  running = false;
}

function stop() {
  stopRequested = true;
  log('用户停止', 'error');
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
  running = false;
}
</script>
